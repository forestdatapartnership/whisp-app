apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: whisp-secrets-provider
  namespace: ${GKE_NAMESPACE}
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "${ENV_SECRET}"
        path: ".env.local"
      - resourceName: "${GEE_SECRET}"
        path: "credentials.json"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisp-beat
  namespace: ${GKE_NAMESPACE}
  labels:
    app: whisp-beat
    env: ${ENVIRONMENT}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisp-beat
  template:
    metadata:
      labels:
        app: whisp-beat
    spec:
      serviceAccountName: whisp-app-ksa
      containers:
      - name: whisp-beat
        image: ${IMAGE_REGISTRY}/whisp-api:${VERSION}
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - exec celery -A src.worker.celery_app beat --pidfile=/tmp/celerybeat.pid 2>&1
        env:
        - name: DEPLOYED_AT
          value: "${DEPLOYED_AT}"
        - name: DB_HOST
          value: "cloud-sql-proxy"
        - name: DB_PORT
          value: "5432"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: gcp-secrets-inline
          mountPath: /app/.env.local
          subPath: .env.local
          readOnly: true
      volumes:
      - name: gcp-secrets-inline
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "whisp-secrets-provider"

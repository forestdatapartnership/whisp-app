apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        uid: prometheus
        isDefault: true
        jsonData:
          manageAlerts: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        uid: loki
        jsonData:
          manageAlerts: false
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  celery-workers.json: |
    {
      "uid": "celery-workers",
      "title": "Celery Workers",
      "schemaVersion": 39,
      "editable": true,
      "time": {"from": "now-6h", "to": "now"},
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "query": "whisp-development,whisp-production",
            "current": {"selected": true, "text": "whisp-development", "value": "whisp-development"},
            "options": [
              {"selected": true, "text": "whisp-development", "value": "whisp-development"},
              {"selected": false, "text": "whisp-production", "value": "whisp-production"}
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "severity",
            "type": "custom",
            "label": "Severity",
            "query": "DEBUG,INFO,WARNING,ERROR,CRITICAL",
            "current": {"selected": true, "text": "All", "value": "$__all"},
            "options": [
              {"selected": true, "text": "All", "value": "$__all"},
              {"selected": false, "text": "DEBUG", "value": "DEBUG"},
              {"selected": false, "text": "INFO", "value": "INFO"},
              {"selected": false, "text": "WARNING", "value": "WARNING"},
              {"selected": false, "text": "ERROR", "value": "ERROR"},
              {"selected": false, "text": "CRITICAL", "value": "CRITICAL"}
            ],
            "includeAll": true,
            "allValue": "DEBUG|INFO|WARNING|ERROR|CRITICAL",
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Workers up",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {"expr": "sum(celery_worker_up{namespace=\"$namespace\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Active tasks",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {"expr": "sum(celery_worker_tasks_active{namespace=\"$namespace\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Queue length",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 12, "x": 12, "y": 0},
          "targets": [
            {"expr": "sum(celery_queue_length{namespace=\"$namespace\"}) by (queue_name)", "legendFormat": "{{queue_name}}", "refId": "A"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Task throughput (tasks/s)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "targets": [
            {"expr": "sum(rate(celery_task_succeeded_total{namespace=\"$namespace\"}[$__rate_interval])) by (name)", "legendFormat": "ok {{name}}", "refId": "A"},
            {"expr": "sum(rate(celery_task_failed_total{namespace=\"$namespace\"}[$__rate_interval])) by (name)", "legendFormat": "fail {{name}}", "refId": "B"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Task runtime p95 (s)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(celery_task_runtime_bucket{namespace=\"$namespace\"}[$__rate_interval])) by (le, name))", "legendFormat": "{{name}}", "refId": "A"}
          ]
        },
        {
          "type": "logs",
          "title": "Worker logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 10, "w": 12, "x": 12, "y": 12},
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", app=~\"whisp-worker-async|whisp-worker-sync\", level=~\"$severity\"} | json | drop __error__, __error_details__ | line_format \"{{ if .message }}{{ .message }}{{ else }}{{ __line__ }}{{ end }}\"",
              "refId": "A"
            }
          ]
        }
      ]
    }
  logs.json: |
    {
      "uid": "logs",
      "title": "Logs",
      "schemaVersion": 39,
      "editable": true,
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "query": "whisp-development,whisp-production",
            "current": {"selected": true, "text": "whisp-development", "value": "whisp-development"},
            "options": [
              {"selected": true, "text": "whisp-development", "value": "whisp-development"},
              {"selected": false, "text": "whisp-production", "value": "whisp-production"}
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "severity",
            "type": "custom",
            "label": "Severity",
            "query": "DEBUG,INFO,WARNING,ERROR,CRITICAL",
            "current": {"selected": true, "text": "All", "value": "$__all"},
            "options": [
              {"selected": true, "text": "All", "value": "$__all"},
              {"selected": false, "text": "DEBUG", "value": "DEBUG"},
              {"selected": false, "text": "INFO", "value": "INFO"},
              {"selected": false, "text": "WARNING", "value": "WARNING"},
              {"selected": false, "text": "ERROR", "value": "ERROR"},
              {"selected": false, "text": "CRITICAL", "value": "CRITICAL"}
            ],
            "includeAll": true,
            "allValue": "DEBUG|INFO|WARNING|ERROR|CRITICAL",
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Log volume by severity",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
          "fieldConfig": {
            "defaults": {
              "custom": {"stacking": {"mode": "normal"}, "fillOpacity": 80}
            }
          },
          "targets": [
            {
              "expr": "sum by (level) (count_over_time({namespace=\"$namespace\", level=~\"$severity\"}[$__interval]))",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 18, "w": 24, "x": 0, "y": 6},
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", level=~\"$severity\"} | json | drop __error__, __error_details__ | line_format \"{{ if .message }}{{ .message }}{{ else }}{{ __line__ }}{{ end }}\"",
              "refId": "A"
            }
          ]
        }
      ]
    }
  cluster-resources.json: |
    {
      "uid": "cluster-resources",
      "title": "Cluster Resources",
      "schemaVersion": 39,
      "editable": true,
      "time": {"from": "now-6h", "to": "now"},
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "Node CPU used %",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}},
          "targets": [
            {"expr": "100 * (1 - avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[$__rate_interval])))", "legendFormat": "{{node}}", "refId": "A"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Node memory used %",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}},
          "targets": [
            {"expr": "100 * (1 - sum by (node)(node_memory_MemAvailable_bytes) / sum by (node)(node_memory_MemTotal_bytes))", "legendFormat": "{{node}}", "refId": "A"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod CPU (cores)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {"expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[$__rate_interval])) by (namespace, pod)", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod memory (working set)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [
            {"expr": "sum(container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) by (namespace, pod)", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
  labels:
    app: grafana
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: email
        receivers:
          - uid: email-default
            type: email
            settings:
              addresses: radu.urdea@fao.org
  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: email
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: resources
        folder: Monitoring
        interval: 1m
        rules:
          - uid: node-cpu-high
            title: Node CPU above 90%
            condition: C
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: 'Node {{ $labels.node }} CPU above 90% (CPU: {{ printf "%.1f" $values.A.Value }}%, Memory: {{ printf "%.1f" $values.B.Value }}%)'
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  editorMode: code
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  expr: '100 * (1 - avg by (node) (rate(node_cpu_seconds_total{mode="idle"}[5m])))'
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: B
                  editorMode: code
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  expr: '100 * (1 - sum by (node)(node_memory_MemAvailable_bytes) / sum by (node)(node_memory_MemTotal_bytes))'
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params: [90]
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        type: last
                        params: []
          - uid: node-mem-high
            title: Node memory above 90%
            condition: C
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: 'Node {{ $labels.node }} memory above 90% (Memory: {{ printf "%.1f" $values.A.Value }}%, CPU: {{ printf "%.1f" $values.B.Value }}%)'
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  editorMode: code
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  expr: '100 * (1 - sum by (node)(node_memory_MemAvailable_bytes) / sum by (node)(node_memory_MemTotal_bytes))'
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: B
                  editorMode: code
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  expr: '100 * (1 - avg by (node) (rate(node_cpu_seconds_total{mode="idle"}[5m])))'
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params: [90]
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        type: last
                        params: []
      - orgId: 1
        name: logs
        folder: Monitoring
        interval: 1m
        rules:
          - uid: error-logs
            title: Errors logged
            condition: C
            for: 0m
            noDataState: OK
            labels:
              severity: warning
            annotations:
              summary: 'Errors detected in application logs (last 5m): [{{ $labels.namespace }}/{{ $labels.pod }}] {{ $labels.name }}: {{ $labels.message }}'
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: loki
                model:
                  refId: A
                  editorMode: code
                  queryType: instant
                  expr: 'sum by (namespace, pod, name, message) (count_over_time({level=~"ERROR|CRITICAL"} | json [5m]))'
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - type: query
                      evaluator:
                        type: gt
                        params: [0]
                      operator:
                        type: and
                      query:
                        params: [C]
                      reducer:
                        type: last
                        params: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.2.0
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: admin-user
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: admin-password
        - name: GF_SERVER_ROOT_URL
          value: "https://whisp-dev.openforis.org/monitoring/"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_SMTP_ENABLED
          value: "true"
        - name: GF_SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: grafana-smtp
              key: host
              optional: true
        - name: GF_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: grafana-smtp
              key: user
              optional: true
        - name: GF_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-smtp
              key: password
              optional: true
        - name: GF_SMTP_FROM_ADDRESS
          valueFrom:
            secretKeyRef:
              name: grafana-smtp
              key: from_address
              optional: true
        - name: GF_SMTP_FROM_NAME
          value: "Whisp Grafana"
        ports:
        - name: web
          containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: provisioning-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: provisioning-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: provisioning-alerting
          mountPath: /etc/grafana/provisioning/alerting
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
      volumes:
      - name: provisioning-datasources
        configMap:
          name: grafana-provisioning
          items:
          - key: datasources.yaml
            path: datasources.yaml
      - name: provisioning-dashboards
        configMap:
          name: grafana-provisioning
          items:
          - key: dashboards.yaml
            path: dashboards.yaml
      - name: provisioning-alerting
        configMap:
          name: grafana-alerting
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - name: web
    protocol: TCP
    port: 3000
    targetPort: 3000

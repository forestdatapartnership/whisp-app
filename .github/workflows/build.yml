name: Build and Push Docker Image

on:
  push:
    branches: 
      - main
      - release/**
    paths-ignore:
      - '.github/**'
      - 'infra/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    env:
      REF_TO_BUILD: ${{ github.event_name == 'workflow_call' && inputs.branch || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.REF_TO_BUILD }}

      - name: Extract version
        id: package_version
        run: |
          VERSION=$(tr -d '[:space:]' < .version)
          [ -n "$VERSION" ] || { echo "Missing .version"; exit 1; }
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_ID_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.REGISTRY }}

      - name: Build and push app image
        run: |
          docker build --build-arg VERSION=${{ steps.package_version.outputs.version }} -t ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-app:${{ steps.package_version.outputs.version }} -f app/Dockerfile .
          docker push ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-app:${{ steps.package_version.outputs.version }}

      - name: Build and push api image
        run: |
          docker build --build-arg VERSION=${{ steps.package_version.outputs.version }} -t ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-api:${{ steps.package_version.outputs.version }} -f api/Dockerfile .
          docker push ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-api:${{ steps.package_version.outputs.version }}

      - name: Build and push db-migrate image
        run: |
          docker build -t ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-db-migrate:${{ steps.package_version.outputs.version }} -f db/Dockerfile .
          docker push ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/whisp-db-migrate:${{ steps.package_version.outputs.version }}

      - name: Clean up untagged images
        run: |
          for IMAGE in whisp-app whisp-api whisp-db-migrate; do
            gcloud artifacts docker images list ${{ vars.REGISTRY }}/${{ vars.PROJECT_ID }}/${{ vars.REPOSITORY }}/${IMAGE} \
              --include-tags --filter="-tags:*" \
              --format="value[separator='@'](IMAGE,DIGEST)" | \
              xargs -I {} gcloud artifacts docker images delete "{}" --quiet --async || true
          done
